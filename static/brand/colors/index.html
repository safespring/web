<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Color Library</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --ink: #202426;
        --soft: #68757b;
        --muted: #8b989e;
        --line: #d8e3e8;
        --panel: #f7fafb;
        --accent: #195f8c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: 100%;
        max-width: 1540px;
        min-height: 100svh;
        margin: 0 auto;
        padding: 26px clamp(18px, 4vw, 56px) 48px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 4;
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(280px, auto);
        gap: 22px;
        align-items: start;
        padding-bottom: 22px;
        background: linear-gradient(180deg, var(--bg) 76%, rgba(255, 255, 255, 0));
      }

      h1 {
        margin: 0;
        font-size: clamp(2.15rem, 5vw, 4.2rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .hint {
        margin: 10px 0 0;
        max-width: 48ch;
        color: var(--soft);
        line-height: 1.45;
      }

      .palette-grid {
        min-height: calc(100svh - 190px);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(30px, 5vw, 56px) clamp(34px, 3vw, 52px);
        align-items: start;
        padding-top: 26px;
      }

      .color-card {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr);
        gap: 14px;
        align-items: center;
        min-height: 330px;
        min-width: 0;
      }

      .visual {
        position: relative;
        display: grid;
        justify-items: center;
        align-items: end;
        min-height: 318px;
      }

      .visual.single-visual {
        align-items: center;
      }

      .visual.single-visual .arc-label {
        top: 82px;
      }

      .arc-label {
        position: absolute;
        top: 7px;
        left: 50%;
        width: 112px;
        height: 38px;
        overflow: visible;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .arc-label text {
        fill: var(--token-label, #313b40);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .stack {
        width: 104px;
        min-height: 286px;
        border: 2px solid var(--token-border, #cad7de);
        border-radius: 999px;
        display: grid;
        justify-items: center;
        align-content: space-between;
        padding: 14px;
        background: #ffffff;
      }

      .stack.single-tone {
        align-content: center;
        width: 104px;
        min-height: 104px;
        height: 104px;
      }

      .dot {
        width: 70px;
        aspect-ratio: 1;
        border: 0;
        border-radius: 50%;
        padding: 0;
      }

      .dot:focus-visible {
        outline: 3px solid rgba(25, 95, 140, 0.22);
        outline-offset: 3px;
      }

      .info {
        position: relative;
        display: grid;
        align-content: start;
        min-height: 286px;
        min-width: 0;
      }

      .info.single-info {
        align-content: center;
      }

      .tone-list {
        width: 100%;
        margin-top: 35px;
        border: 0;
        border-radius: 0;
        background: transparent;
        border-collapse: collapse;
        table-layout: auto;
      }

      .info.single-info .tone-list {
        margin-top: 0;
        transform: translateY(1px);
      }

      .tone {
        height: 92px;
      }

      .tone th,
      .tone td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      .tone td {
        padding: 18px 0;
      }

      .tone:last-child th,
      .tone:last-child td {
        border-bottom: 0;
      }

      .tone-label {
        width: 1%;
        padding: 26px 15px 26px 3px;
        font-weight: 700;
        color: var(--ink);
        font-size: 0.94rem;
        white-space: nowrap;
      }

      .copy-button {
        display: grid;
        align-content: center;
        gap: 4px;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #3f4a4f;
        padding: 0 3px;
        font-variant-numeric: tabular-nums;
        text-align: left;
        white-space: nowrap;
        transform-origin: center;
        transition:
          color 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      .copy-kind {
        color: var(--muted);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 0.56rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        line-height: 1;
        text-transform: uppercase;
      }

      .copy-value {
        font-family: "Aptos Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.7rem;
        line-height: 1;
      }

      .copy-button:hover {
        color: var(--accent);
        background: transparent;
        transform: scale(1.06);
      }

      .code-hex {
        color: #345a6e;
        background: transparent;
      }

      .code-rgb {
        color: #35513a;
        background: transparent;
      }

      .code-cmyk {
        color: #604c45;
        background: transparent;
      }

      @media (max-width: 1180px) {
        .palette-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 1120px) {
        .topbar {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .shell {
          padding-left: 16px;
          padding-right: 16px;
        }

        .palette-grid {
          grid-template-columns: 1fr;
          gap: 36px;
        }

        .color-card {
          grid-template-columns: 104px minmax(0, 1fr);
          gap: 14px;
        }

        .visual {
          min-height: 302px;
        }

        .visual.single-visual .arc-label {
          top: 86px;
        }

        .arc-label {
          width: 108px;
          height: 36px;
        }

        .arc-label text {
          font-size: 15px;
        }

        .stack {
          width: 92px;
          min-height: 270px;
          padding: 12px 9px;
        }

        .dot {
          width: 68px;
        }

        .stack.single-tone {
          width: 96px;
          min-height: 96px;
          height: 96px;
        }

      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Color Library</h1>
          <p class="hint">Find brand colors, inspect exact HEX, RGB, and CMYK values, and copy the format you need.</p>
        </div>
      </header>

      <main>
        <section class="palette-grid" id="paletteGrid" aria-label="Color library"></section>
      </main>
    </div>

    <script>
      const palette = {
        colors: {
          blue: {
            dark: { base: "#195F8C", t10: "#30709A", t90: "#E8EFF3" },
            mid: { base: "#417DA5", t10: "#548AAD", t90: "#ECF2F6" },
            bright: { base: "#3C9BCD", t10: "#50A5D2", t90: "#EBF5FA" },
          },
          green: {
            primary: { base: "#32CD32", t10: "#47D447", t90: "#EBFAEB" },
            web: { base: "#19F064", t10: "#30F275", t90: "#E8FDF0" },
          },
          orange: {
            primary: { base: "#FA690F", t10: "#FB7A27", t90: "#FEF0E7" },
          },
          neutral: {
            cloudBlue: { base: "#E7EFF3", t10: "#EAF1F5", t90: "#FDFEFE" },
            black: { base: "#323232", t10: "#474747", t90: "#F0F0F0" },
            cloudWhite: { base: "#FAFEFE", t10: "#FBFEFE", t90: "#FEFFFF" },
          },
        },
      };

      const names = {
        "blue.dark": "Main blue",
        "blue.mid": "Middle blue",
        "blue.bright": "Clear blue",
        "green.primary": "Green",
        "green.web": "Web Green",
        "orange.primary": "Orange",
        "neutral.cloudBlue": "Cloud Blue",
        "neutral.black": "Charcoal",
        "neutral.cloudWhite": "Cloud White",
      };

      const toneLabels = {
        light: "Light",
        main: "Main",
        dark: "Dark",
      };

      const paletteGrid = document.querySelector("#paletteGrid");

      const tokens = Object.entries(palette.colors).flatMap(([family, variants]) =>
        Object.entries(variants).map(([variant, colors]) => {
          const id = `${family}.${variant}`;
          return {
            id,
            family,
            variant,
            label: names[id] || `${family} ${variant}`,
            tones: buildTones(family, colors.base),
          };
        }),
      );

      function buildTones(family, baseHex) {
        if (family === "neutral") {
          return [buildTone("main", baseHex)];
        }

        return [
          buildTone("light", transformLightness(baseHex, 0.8)),
          buildTone("main", baseHex),
          buildTone("dark", transformLightness(baseHex, -0.25)),
        ];
      }

      function buildTone(tone, hex) {
        const rgb = hexToRgb(hex);
        const cmyk = rgbToCmyk(rgb);
        return {
          tone,
          label: toneLabels[tone],
          hex,
          rgb,
          cmyk,
          rgbText: `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`,
          cmykText: `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`,
        };
      }

      function transformLightness(hex, amount) {
        const hsl = rgbToHsl(hexToRgb(hex));
        const lightness =
          amount >= 0
            ? hsl.l * (1 - amount) + amount
            : hsl.l * (1 + amount);
        return hslToHex({ ...hsl, l: clamp01(lightness) });
      }

      function clamp01(value) {
        return Math.min(1, Math.max(0, value));
      }

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16),
        };
      }

      function rgbToHsl({ r, g, b }) {
        const rp = r / 255;
        const gp = g / 255;
        const bp = b / 255;
        const max = Math.max(rp, gp, bp);
        const min = Math.min(rp, gp, bp);
        const l = (max + min) / 2;

        if (max === min) {
          return { h: 0, s: 0, l };
        }

        const d = max - min;
        const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        let h;
        if (max === rp) {
          h = (gp - bp) / d + (gp < bp ? 6 : 0);
        } else if (max === gp) {
          h = (bp - rp) / d + 2;
        } else {
          h = (rp - gp) / d + 4;
        }

        return { h: h / 6, s, l };
      }

      function hslToHex({ h, s, l }) {
        let r;
        let g;
        let b;

        if (s === 0) {
          r = l;
          g = l;
          b = l;
        } else {
          const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
          const p = 2 * l - q;
          r = hueToRgb(p, q, h + 1 / 3);
          g = hueToRgb(p, q, h);
          b = hueToRgb(p, q, h - 1 / 3);
        }

        return `#${[r, g, b]
          .map((channel) => Math.round(channel * 255).toString(16).padStart(2, "0"))
          .join("")
          .toUpperCase()}`;
      }

      function hueToRgb(p, q, t) {
        let value = t;
        if (value < 0) value += 1;
        if (value > 1) value -= 1;
        if (value < 1 / 6) return p + (q - p) * 6 * value;
        if (value < 1 / 2) return q;
        if (value < 2 / 3) return p + (q - p) * (2 / 3 - value) * 6;
        return p;
      }

      function rgbToCmyk({ r, g, b }) {
        const rp = r / 255;
        const gp = g / 255;
        const bp = b / 255;
        const k = 1 - Math.max(rp, gp, bp);
        if (k >= 0.999999) {
          return { c: 0, m: 0, y: 0, k: 100 };
        }
        return {
          c: Math.round(((1 - rp - k) / (1 - k)) * 100),
          m: Math.round(((1 - gp - k) / (1 - k)) * 100),
          y: Math.round(((1 - bp - k) / (1 - k)) * 100),
          k: Math.round(k * 100),
        };
      }

      function toneCopyText(token, tone) {
        return `${token.label} ${tone.label}
HEX ${tone.hex}
RGB ${tone.rgb.r}, ${tone.rgb.g}, ${tone.rgb.b}
CMYK ${tone.cmyk.c}%, ${tone.cmyk.m}%, ${tone.cmyk.y}%, ${tone.cmyk.k}%`;
      }

      function render() {
        paletteGrid.innerHTML = "";
        tokens.forEach((token) => paletteGrid.appendChild(createCard(token)));
      }

      function createCard(token) {
        const card = document.createElement("article");
        const mainTone = token.tones.find((tone) => tone.tone === "main") || token.tones[0];
        const usesNeutralFrame = token.family === "neutral";
        card.className = "color-card";
        card.dataset.id = token.id;
        card.style.setProperty("--token-label", usesNeutralFrame ? "#313b40" : mainTone.hex);
        card.style.setProperty("--token-border", usesNeutralFrame ? "#cad7de" : mainTone.hex);
        card.innerHTML = `
          <div class="visual ${token.tones.length === 1 ? "single-visual" : ""}">
            ${createArcLabel(token)}
            <div class="stack ${token.tones.length === 1 ? "single-tone" : ""}" aria-label="${token.label}">
              ${token.tones
                .map(
                  (tone) => `
                    <button
                      class="dot"
                      type="button"
                      data-copy="${escapeAttr(tone.hex)}"
                      style="background:${tone.hex}"
                      title="Copy ${tone.hex}"
                      aria-label="Copy HEX ${token.label} ${tone.label} ${tone.hex}"
                    ></button>
                  `,
                )
                .join("")}
            </div>
          </div>
          <div class="info ${token.tones.length === 1 ? "single-info" : ""}">
            <table class="tone-list">
              <tbody>
                ${token.tones.map((tone) => createToneRow(token, tone)).join("")}
              </tbody>
            </table>
          </div>
        `;
        return card;
      }

      function createArcLabel(token) {
        const pathId = `arc-${token.id.replace(/[^a-z0-9]+/gi, "-")}`;
        return `
          <svg class="arc-label" viewBox="0 0 118 38" aria-label="${token.label}">
            <defs>
              <path id="${pathId}" d="M 10 33 Q 59 2 108 33" />
            </defs>
            <text text-anchor="middle">
              <textPath href="#${pathId}" startOffset="50%">${token.label}</textPath>
            </text>
          </svg>
        `;
      }

      function createToneRow(token, tone) {
        return `
          <tr class="tone">
            <th class="tone-label" scope="row">
              <span>${tone.label}</span>
            </th>
            ${createCodeCell(tone.hex, tone.hex, "hex")}
            ${createCodeCell(`${tone.rgb.r}/${tone.rgb.g}/${tone.rgb.b}`, tone.rgbText, "rgb")}
            ${createCodeCell(`${tone.cmyk.c}/${tone.cmyk.m}/${tone.cmyk.y}/${tone.cmyk.k}`, tone.cmykText, "cmyk")}
          </tr>
        `;
      }

      function createCodeCell(label, value, kind) {
        const copyLabel = kind === "cmyk" ? "CMYK" : kind.toUpperCase();
        return `
          <td>
            <button class="copy-button code-${kind}" type="button" data-copy="${escapeAttr(value)}" title="Copy ${escapeAttr(value)}">
              <span class="copy-kind">${copyLabel}</span>
              <span class="copy-value">${label}</span>
            </button>
          </td>
        `;
      }

      function escapeAttr(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function copyValue(button, value) {
        await navigator.clipboard.writeText(value);
        const old = button.textContent;
        button.textContent = "Copied";
        button.disabled = true;
        setTimeout(() => {
          button.textContent = old;
          button.disabled = false;
        }, 850);
      }

      paletteGrid.addEventListener("click", async (event) => {
        const copyTarget = event.target.closest("[data-copy]");
        if (!copyTarget) {
          return;
        }
        await copyValue(copyTarget, copyTarget.dataset.copy);
      });

      render();
    </script>
  </body>
</html>
