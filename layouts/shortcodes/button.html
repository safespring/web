<br />
{{ if $.Page.Params.link }}
  <a class="button" target="_blank" href="{{ $.Page.Params.link }}"
    >{{ $.Page.Params.knapp }}</a
  >
{{ else }}
  {{ $href := $.Page.Params.sidebarlinkurl }}
  {{ if strings.HasSuffix $href ".md" }}{{ $href = relref $.Page $href }}{{ end }}
  <a href="{{ $href }}" target="_blank" id="button"
    >{{ $.Page.Params.sidebarlinkname }}{{ if $.Page.Params.sidebarlinkicon }}
      &nbsp;&nbsp;&nbsp;<i class="fas {{ $.Page.Params.sidebarlinkicon }}"></i>
    {{ end }}</a
  >
{{ end }}
